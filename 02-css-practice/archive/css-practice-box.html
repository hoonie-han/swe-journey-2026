<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML CSS</title>
    <style>
        div {
            width: 100px;
            height: 200px;
            border: 3px solid red;
            padding: 20px;
            margin: 10px 30px 20px 40px;

        }

        span {
            width: 100px;
            height: 100px;
            display: inline-block;
            padding: 10px 20px;
            margin: 10px
        }

        .box {
            box-sizing: border-box;
            width: 100px;
            height: 100px;
            border: 5px solid tomato;
            padding: 30px;

        }
    </style>
</head>

<body>
    <div>contents</div>
    <span>check</span>
    <p class="box"> </p>
</body>

</html>

<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Create list</title>
</head>

<body>
    <input name="text" type="text" placeholder="Name" maxlength="10" /> <br> <br>
    <input name="push" type="button" value="push" /> <br> <br>
    <input name="color" type="color" /> Select Color <br> <br>
    <input name="score" type="range" max="100" min="0" step="10" /> <br> <br>
    <input name="calender" type="date" /> <br> <br>

    <h1>Select Animal you want to pet</h1>
    <select name="pet" multiple>
        <option value="dog">Dog</option>
        <option value="cat">Cat</option>
        <option value="hamster">Hamster</option>
        <option value="parrot">Parrot</option>
    </select>
    <br><br>

    <textarea name="content" rows="10" cols="40">Others</textarea>
</body>

</html>
